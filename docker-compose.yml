services:
  timesheet:
    image: ghcr.io/gioixxx/timesheet:latest
    container_name: timesheet
    labels:
      - com.centurylinklabs.watchtower.scope=timesheet
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:///data/timesheet.db
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-}
      EMAIL_IMAP_PORT: ${EMAIL_IMAP_PORT:-993}
      EMAIL_IMAP_USER: ${EMAIL_IMAP_USER:-}
      EMAIL_IMAP_PASSWORD: ${EMAIL_IMAP_PASSWORD:-}
      EMAIL_IMAP_MAILBOX: ${EMAIL_IMAP_MAILBOX:-INBOX}
      EMAIL_ALLOWED_SENDERS: ${EMAIL_ALLOWED_SENDERS:-}
    volumes:
      - timesheet-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  timesheet-data:
